<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>MDAC Assistant</title>

<style>
body{
font-family:Arial;
background:#f5f7fb;
padding:40px;
}

.container{
max-width:600px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h1{
text-align:center;
margin-bottom:30px;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ddd;
border-radius:6px;
}

button{
width:100%;
padding:14px;
margin-top:10px;
background:#ff6b3d;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

textarea{
width:100%;
height:200px;
margin-top:15px;
padding:10px;
border-radius:6px;
border:1px solid #ddd;
}
</style>
</head>

<body>

<div class="container">

<h1>MDAC Assistant</h1>

<input id="name" placeholder="Name">
<input id="passport" placeholder="Passport Number">
<input id="nationality" placeholder="Nationality">
<input id="dob" placeholder="Date of Birth (YYYY-MM-DD)">
<input id="email" placeholder="Email">
<input id="phone" placeholder="Phone Number">

<button onclick="generate()">生成MDAC资料</button>

<textarea id="result" placeholder="生成后会显示在这里"></textarea>

<button onclick="copyText()">一键复制</button>

<button onclick="openMDAC()">打开MDAC官网</button>

</div>

<script>

function generate(){

let name=document.getElementById("name").value;
let passport=document.getElementById("passport").value;
let nationality=document.getElementById("nationality").value;
let dob=document.getElementById("dob").value;
let email=document.getElementById("email").value;
let phone=document.getElementById("phone").value;

let text=
`Name: ${name}
Passport: ${passport}
Nationality: ${nationality}
Date of Birth: ${dob}
Email: ${email}
Phone: ${phone}`;

document.getElementById("result").value=text;

}

function copyText(){

let copy=document.getElementById("result");

copy.select();
document.execCommand("copy");

alert("已复制，可以直接粘贴到MDAC");

}

function openMDAC(){

window.open("https://imigresen-online.imi.gov.my/mdac/main","_blank");

}

</script>

</body>
</html>
