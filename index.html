<!DOCTYPE html>
<html lang="zh">
<head>

<meta charset="UTF-8">
<title>马来西亚 MDAC 入境卡助手</title>

<style>

body{
font-family:Arial;
background:#f3f6fb;
padding:40px;
}

.container{
background:white;
padding:40px;
border-radius:12px;
max-width:650px;
margin:auto;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h1{
text-align:center;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#666;
margin-bottom:30px;
}

label{
font-weight:bold;
}

input,select{
width:100%;
padding:12px;
margin-top:8px;
margin-bottom:18px;
border:1px solid #ddd;
border-radius:6px;
}

button{
width:100%;
padding:14px;
background:#007bff;
color:white;
font-size:16px;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

</style>

</head>

<body>

<div class="container">

<h1>马来西亚 MDAC 入境卡助手</h1>

<div class="subtitle">
填写资料后将自动跳转 MDAC 官方系统
</div>

<label>姓名（护照姓名）</label>
<input id="name">

<label>护照号码</label>
<input id="passport">

<label>国籍</label>
<select id="nation">
<option value="CHINA">中国</option>
<option value="MALAYSIA">马来西亚</option>
<option value="SINGAPORE">新加坡</option>
</select>

<label>出生日期</label>
<input type="date" id="dob">

<label>入境日期</label>
<input type="date" id="arrival">

<label>离境日期</label>
<input type="date" id="departure">

<label>航班号</label>
<input id="flight">

<label>手机号</label>
<input id="phone">

<button onclick="generate()">生成 MDAC 入境卡</button>

</div>

<script>

function generate(){

localStorage.setItem("name",document.getElementById("name").value)
localStorage.setItem("passport",document.getElementById("passport").value)
localStorage.setItem("nation",document.getElementById("nation").value)
localStorage.setItem("dob",document.getElementById("dob").value)
localStorage.setItem("arrival",document.getElementById("arrival").value)
localStorage.setItem("departure",document.getElementById("departure").value)
localStorage.setItem("flight",document.getElementById("flight").value)
localStorage.setItem("phone",document.getElementById("phone").value)

localStorage.setItem("email","yanzu0924@gmail.com")
localStorage.setItem("hotel","Hotel")
localStorage.setItem("address","No 7, Jalan Dutamas 2, Dutamas, Kuala Lumpur")
localStorage.setItem("state","WP KUALA LUMPUR")
localStorage.setItem("city","KUALA LUMPUR")
localStorage.setItem("postcode","50480")

alert("资料保存成功，即将跳转 MDAC 官方网站")

window.location.href="https://imigresen-online.imi.gov.my/mdac/main"

}

</script>

</body>
</html>
