<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Malaysia MDAC Assistant</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family: Arial;
background:#f4f6fb;
margin:0;
padding:40px;
}

.container{
max-width:600px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h1{
text-align:center;
}

input,select{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ddd;
border-radius:5px;
}

button{
width:100%;
padding:12px;
background:#007bff;
color:white;
border:none;
border-radius:5px;
font-size:16px;
}

.notice{
font-size:12px;
color:#777;
text-align:center;
margin-bottom:20px;
}
</style>
</head>

<body>

<div class="container">

<h1>Malaysia MDAC Assistant</h1>

<div class="notice">
Unofficial helper for Malaysia Digital Arrival Card
</div>

<h3>Personal Information</h3>

<input placeholder="Full Name">
<input placeholder="Passport Number">

<select>
<option>Nationality</option>
<option>China</option>
<option>Japan</option>
<option>Korea</option>
</select>

<h3>Arrival Information</h3>

<input type="date">
<input placeholder="Flight Number">

<button>Continue</button>

</div>

</body>
</html>
