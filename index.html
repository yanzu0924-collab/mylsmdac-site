<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>马来西亚 MDAC 入境卡助手</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
padding:40px;
}

.container{
background:white;
padding:30px;
border-radius:10px;
max-width:600px;
margin:auto;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h1{
text-align:center;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:20px;
}

button{
width:100%;
padding:12px;
background:#007bff;
color:white;
border:none;
border-radius:5px;
font-size:16px;
}
</style>
</head>

<body>

<div class="container">

<h1>马来西亚 MDAC 入境助手</h1>

<label>姓名</label>
<input id="name">

<label>护照号码</label>
<input id="passport">

<label>国籍</label>
<select id="nation">
<option value="CHINA">中国</option>
<option value="MALAYSIA">马来西亚</option>
</select>

<label>出生日期</label>
<input type="date" id="dob">

<label>入境日期</label>
<input type="date" id="arrival">

<label>航班号</label>
<input id="flight">

<label>手机号</label>
<input id="phone">

<button onclick="save()">生成 MDAC</button>

</div>

<script>

function save(){

localStorage.setItem("name",document.getElementById("name").value)
localStorage.setItem("passport",document.getElementById("passport").value)
localStorage.setItem("nation",document.getElementById("nation").value)
localStorage.setItem("dob",document.getElementById("dob").value)
localStorage.setItem("arrival",document.getElementById("arrival").value)
localStorage.setItem("flight",document.getElementById("flight").value)
localStorage.setItem("phone",document.getElementById("phone").value)

alert("资料已保存，准备跳转 MDAC 官网")

window.location.href="https://imigresen-online.imi.gov.my/mdac/main"

}

</script>

</body>
</html>
